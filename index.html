<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Flexbox practice project from FreeCodeCamp"
    />
    <meta name="author" content="G00bi" />
    <link rel="stylesheet" href="styles.css" />
    <title>Page of Pokemon Cards</title>
  </head>
  <body>
    <main id="pokemon-cards">
      <div class="card">
        <img
          src="Images/light-pink-bg.jpg"
          alt="light pink cloudy background"/>

        <div class="card-header">
          <h2>Jigglypuff</h2>
          <div class="stats">
            <p>HP 90</p>
            <img src="Images/fairy.webp" alt="Fairy type icon" />
          </div>
        </div>

        <div class="main-picture">
            <img
              src="Images/Jigglypuff Illustration.png"
              alt="Jigglypuff main picture"/>
        </div>

        <div class="skill">
          <div class="first-hability">
            <img src="Images/fairy.webp" alt="Fairy type icon"/>
            <h5>Singing Voice</h5>
            <p>10</p>
          </div>

          <div class="second-hability">
            <div class="images">
              <img src="Images/fairy.webp" alt="Fairy type icon">
              <img src="Images/normaltype-symbol.png" alt="Normal type icon">
            </div>
            <h5>Rollout</h5>
            <p>30</p>

          </div>

        

        </div>
      </div>
    </main>
  </body>
</html>
