<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Flexbox practice project from FreeCodeCamp"
    />
    <meta name="author" content="G00bi" />
    <link rel="stylesheet" href="styles.css" />
    <title>Page of Pokemon Cards</title>
  </head>
  <body>
    <main id="pokemon-cards">
      <div class="card">
        <img
          src="Images/light-pink-bg.jpg"
          alt="light pink cloudy background"
        />

        <div class="card-header">
          <h2>Jigglypuff</h2>
          <div class="stats">
            <p>HP 90</p>
            <img src="Images/fairy.webp" alt="Fairy type icon" />
          </div>
        </div>

        <div class="main-picture">
          <img
            src="Images/Jigglypuff Illustration.png"
            alt="Jigglypuff main picture"
          />
        </div>

        <div class="skill">
          <div class="first-ability">
            <img src="Images/fairy.webp" alt="Fairy type icon" />
            <h5>Singing Voice</h5>
            <p>10</p>
          </div>
          <div class="second-ability">
            <div class="images">
              <img src="Images/fairy.webp" alt="Fairy type icon" />
              <img src="Images/normaltype-symbol.png" alt="Normal type icon" />
            </div>
            <h5>Rollout</h5>
            <p>30</p>
          </div>
        </div>

        <div class="footer">
          <div class="weakness">
            <h6>weakness</h6>
            <div class="value">
              <img src="Images/metaltype.png" alt="Metal type icon" />
              <span>x2</span>
            </div>
          </div>
          <div class="resistance">
            <h6>resistance</h6>
            <div class="value">
              <img src="Images/darktype.png" alt="Dark type icon" />
              <span>-20</span>
            </div>
          </div>

<!--Piplup code-->

        </div>
      </div>
      <div class="card">
        <div class="background"><div class="top-part">
          <h1>Piplup</h1>
          <span><p>HP 60</p></span>
        </div>
      </div>  
      </div>
    </main>
  </body>
</html>
